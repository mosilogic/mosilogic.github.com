<header class="app-header">
  <nav>
    <button routerLink="/genlv" routerLinkActive="active">GenLv</button>
    <button routerLink="/schneider" routerLinkActive="active">Circuit Vector</button>
    <button routerLink="/vector-to-graph" routerLinkActive="active">Vector → Graph</button>
    <button routerLink="/test-map" routerLinkActive="active">Test Map</button>
  </nav>

  <button class="theme-toggle" (click)="toggleDark()" [title]="isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
    <span *ngIf="!isDark">🌙 Dark</span>
    <span *ngIf="isDark">☀️ Light</span>
  </button>
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
